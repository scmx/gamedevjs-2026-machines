<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020617" />
    <title>GameDevJS 2026 Side Scroller</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <main class="game_shell">
      <canvas id="background_canvas"></canvas>
      <canvas id="tiles_canvas"></canvas>
      <canvas id="objects_canvas"></canvas>
      <button id="menu_button" class="menu_toggle_button" type="button">Menu</button>
      <section id="main_menu" class="game_menu" hidden>
        <div class="game_menu_panel">
          <h1 id="menu_title">Main Menu</h1>
          <p>Menu button opens this overlay. O toggles the editor.</p>
          <div class="game_menu_actions">
            <button id="menu_resume_button" type="button">Resume</button>
            <button id="menu_edit_button" type="button" hidden>Edit</button>
            <button id="menu_editor_button" type="button">Editor</button>
            <button id="menu_level_prev_button" type="button" hidden>Level -</button>
            <button id="menu_level_next_button" type="button" hidden>Level +</button>
            <button id="menu_player_button" type="button">1-player</button>
            <button id="menu_music_button" type="button">Music 3</button>
            <button id="menu_sfx_button" type="button">SFX 3</button>
            <button id="menu_restart_button" type="button">Restart</button>
          </div>
        </div>
      </section>
      <div class="game_toolbar">
        <button id="seed_button" type="button" data-editor-only="true">Seed</button>
        <button id="music_button" type="button" data-editor-only="true">Music</button>
        <button id="mount_button" type="button" data-editor-only="true">Mount Data</button>
        <button id="import_button" type="button" data-editor-only="true">Import</button>
        <button id="save_edits_button" type="button" data-editor-only="true">Export</button>
        <button id="reload_edits_button" type="button" data-editor-only="true">Reload level</button>
        <button id="undo_edits_button" type="button" data-editor-only="true">Undo edit</button>
        <button id="autosave_button" type="button" data-editor-only="true">Auto-save OFF</button>
        <button id="restart_button" type="button">Restart</button>
      </div>
    </main>
    <script type="importmap">
      {
        "imports": {
          "./editor-block-variants.js": "./editor-block-variants.js?v=1777215180",
          "./editor-brick-variants.js": "./editor-brick-variants.js?v=1777215180",
          "./editor-coin-variants.js": "./editor-coin-variants.js?v=1777215180",
          "./editor-decor-variants.js": "./editor-decor-variants.js?v=1777215180",
          "./editor-edit-log.js": "./editor-edit-log.js?v=1777215180",
          "./editor-edit-log.test.js": "./editor-edit-log.test.js?v=1777215180",
          "./editor-hazard-variants.js": "./editor-hazard-variants.js?v=1777215180",
          "./editor-init.js": "./editor-init.js?v=1779452876",
          "./editor-ladder.js": "./editor-ladder.js?v=1777215180",
          "./editor-placeables.js": "./editor-placeables.js?v=1779449714",
          "./editor-terrain-ops.js": "./editor-terrain-ops.js?v=1777215180",
          "./editor-terrain-ops.test.js": "./editor-terrain-ops.test.js?v=1777215180",
          "./editor-terrain.js": "./editor-terrain.js?v=1778762798",
          "./game-controller.js": "./game-controller.js?v=1778943959",
          "./game-dom.js": "./game-dom.js?v=1778941003",
          "./game-draw.js": "./game-draw.js?v=1779449732",
          "./game-entities.js": "./game-entities.js?v=1779454275",
          "./game-entities.test.js": "./game-entities.test.js?v=1778772282",
          "./game-init.js": "./game-init.js?v=1778763092",
          "./game-loop.js": "./game-loop.js?v=1778922347",
          "./game-prefs.js": "./game-prefs.js?v=1777215180",
          "./game-sounds.js": "./game-sounds.js?v=1778767189",
          "./game-state.js": "./game-state.js?v=1778940517",
          "./game-update.js": "./game-update.js?v=1778941011",
          "./project-storage.js": "./project-storage.js?v=1778765337",
          "./terrain-biome.js": "./terrain-biome.js?v=1777215180",
          "./terrain-fluid.js": "./terrain-fluid.js?v=1777215179",
          "./zzfxm.js": "./zzfxm.js?v=1777215180"
        }
      }
    </script>
    <script src="./zzfx.js"></script>
    <script src="./zzfxm.js"></script>
    <script type="module">
      import init from "./game-init.js"
      init(background_canvas, tiles_canvas, objects_canvas)
    </script>
  </body>
</html>
