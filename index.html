<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#020617" />
    <title>GameDevJS 2026 Side Scroller</title>
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <main class="game_shell">
      <canvas id="background_canvas"></canvas>
      <canvas id="tiles_canvas"></canvas>
      <canvas id="objects_canvas"></canvas>
      <div class="game_debug">
        <button id="seed_button" type="button">Seed</button>
      </div>
      <div class="game_menu">
        <button id="restart_button" type="button">Restart</button>
      </div>
    </main>
    <script src="./zzfx.js"></script>
    <script type="module">
      import init from "./game-init.js"
      init(background_canvas, tiles_canvas, objects_canvas)
    </script>
  </body>
</html>
